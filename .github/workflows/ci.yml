name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, securityv01 ]
  pull_request:
    branches: [ main, master ]

jobs:
  logic-and-testing:
    name: Code Efficiency & Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Logic & Type Efficiency Check
        run: npm run lint
        
      - name: Run Unit Tests
        run: npm run test

      - name: Production Build Verification
        run: npm run build
